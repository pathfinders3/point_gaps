<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포인트 뷰어 · 간격 조절</title>
<style>
  :root{
    --bg: #14161a;
    --panel: #1c1f25;
    --line: #2a2e36;
    --ink: #e7e9ee;
    --sub: #8b93a3;
    --accent: #5ee6c8;
    --accent-dim: #2f4a45;
    --warn: #ff8a65;
    --mono: 'SF Mono', 'JetBrains Mono', Consolas, monospace;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; height:100%;
    background:var(--bg);
    color:var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
  }
  .app{
    display:flex;
    flex-direction:column;
    height:100%;
  }
  header{
    padding:16px 20px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
  }
  .title{
    display:flex;
    align-items:baseline;
    gap:10px;
  }
  .title h1{
    font-size:16px;
    margin:0;
    letter-spacing:0.02em;
    font-weight:600;
  }
  .title .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    color:var(--accent);
    letter-spacing:0.08em;
    text-transform:uppercase;
  }
  .toolbar{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
  }
  button{
    font-family:inherit;
    font-size:13px;
    color:var(--ink);
    background:var(--panel);
    border:1px solid var(--line);
    padding:9px 14px;
    border-radius:7px;
    cursor:pointer;
    transition: border-color .15s ease, background .15s ease, transform .05s ease;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  button:hover{ border-color: var(--accent); background:#20242b; }
  button:active{ transform: scale(0.97); }
  button:disabled{ opacity:0.35; cursor:not-allowed; }
  button:disabled:hover{ border-color:var(--line); background:var(--panel); }
  .btn-primary{
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
    font-weight:600;
  }
  .btn-primary:hover{ background:#396058; }
  .scale-group{
    display:flex;
    align-items:center;
    gap:2px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:7px;
    padding:2px;
  }
  .scale-group button{
    border:none;
    background:transparent;
    border-radius:5px;
  }
  .scale-group button:hover{ background:#282c34; }
  .group-label{
    font-size:11px;
    color:var(--sub);
    letter-spacing:0.04em;
    margin-left:4px;
  }
  .scale-readout{
    font-family:var(--mono);
    font-size:13px;
    color:var(--accent);
    min-width:56px;
    text-align:center;
  }
  main{
    flex:1;
    display:flex;
    min-height:0;
  }
  .canvas-wrap{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:auto;
    padding:24px;
    position:relative;
  }
  canvas{
    background:
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px) 0 0/24px 24px,
      linear-gradient(0deg, rgba(255,255,255,0.035) 1px, transparent 1px) 0 0/24px 24px,
      #0f1114;
    border:1px solid var(--line);
    border-radius:8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
  }
  .empty-state{
    position:absolute;
    text-align:center;
    color:var(--sub);
    font-size:14px;
    max-width:280px;
    line-height:1.6;
    pointer-events:none;
  }
  .empty-state .eyebrow{
    display:block;
    font-family:var(--mono);
    font-size:11px;
    color:var(--accent);
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin-bottom:8px;
  }
  aside{
    width:260px;
    border-left:1px solid var(--line);
    padding:20px;
    overflow-y:auto;
    font-size:13px;
    flex-shrink:0;
  }
  aside h2{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--sub);
    margin:0 0 12px 0;
    font-weight:600;
  }
  .stat-row{
    display:flex;
    justify-content:space-between;
    padding:7px 0;
    border-bottom:1px solid var(--line);
    font-family:var(--mono);
    font-size:12.5px;
  }
  .stat-row span:first-child{ color:var(--sub); }
  .stat-row span:last-child{ color:var(--ink); }
  .seg-list{ margin-top:20px; }
  .seg-item{
    display:flex;
    align-items:center;
    gap:8px;
    padding:6px 0;
    font-family:var(--mono);
    font-size:12px;
    color:var(--sub);
  }
  .swatch{
    width:10px; height:10px;
    border-radius:2px;
    flex-shrink:0;
  }
  .hint{
    margin-top:20px;
    padding-top:16px;
    border-top:1px solid var(--line);
    color:var(--sub);
    font-size:11.5px;
    line-height:1.6;
  }
  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--ink);
    padding:10px 18px;
    border-radius:8px;
    font-size:13px;
    opacity:0;
    transition: opacity .2s ease, transform .2s ease;
    pointer-events:none;
    z-index:50;
  }
  .toast.warn{ border-color: var(--warn); color:var(--warn); }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="title">
      <span class="eyebrow">Point Viewer</span>
      <h1>다각선 포인트 뷰어</h1>
    </div>
    <div class="toolbar">
      <button class="btn-primary" id="pasteBtn">📋 JSON 붙여넣기</button>
      <span class="group-label">간격</span>
      <div class="scale-group">
        <button id="decBtn" title="간격 10% 줄이기">−10%</button>
        <span class="scale-readout" id="scaleReadout">100%</span>
        <button id="incBtn" title="간격 10% 늘리기">+10%</button>
      </div>
      <button id="resetBtn" title="원래 간격으로">리셋</button>
      <span class="group-label">크기</span>
      <div class="scale-group">
        <button id="sizeDecBtn" title="점 크기 50% 줄이기">−50%</button>
        <span class="scale-readout" id="sizeReadout">100%</span>
        <button id="sizeIncBtn" title="점 크기 50% 늘리기">+50%</button>
      </div>
      <button id="sizeResetBtn" title="원래 점 크기로">리셋</button>
    </div>
  </header>
  <main>
    <div class="canvas-wrap">
      <canvas id="canvas" width="600" height="600"></canvas>
      <div class="empty-state" id="emptyState">
        <span class="eyebrow">대기 중</span>
        JSON 데이터를 클립보드에 복사한 뒤<br>
        <b>JSON 붙여넣기</b> 버튼을 눌러주세요.
      </div>
    </div>
    <aside>
      <h2>데이터 정보</h2>
      <div class="stat-row"><span>그룹 수</span><span id="statGroups">–</span></div>
      <div class="stat-row"><span>다각선 수</span><span id="statSegs">–</span></div>
      <div class="stat-row"><span>총 포인트</span><span id="statPoints">–</span></div>
      <div class="stat-row"><span>현재 간격</span><span id="statScale">100%</span></div>
      <div class="stat-row"><span>현재 점 크기</span><span id="statSizeScale">100%</span></div>

      <div class="seg-list" id="segList"></div>

      <div class="hint">
        <b>간격</b> 버튼은 도형 중심을 기준으로 점의 위치를 밀거나 당겨 점 사이 거리를 조절합니다 (모양은 유지).<br><br>
        <b>크기</b> 버튼은 간격과 무관하게 점 자체의 픽셀 크기만 별도로 키우거나 줄입니다.
      </div>
    </aside>
  </main>
</div>
<div class="toast" id="toast"></div>

<script src="pointGaps.js"></script>
</body>
</html>
